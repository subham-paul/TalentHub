{% extends "base.html" %}
{% block title %}Apply Job{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-sm p-4">
                
                <!-- Job brief -->
                <h3 class="text-primary fw-bold">{{ job.title }}</h3>
                <p class="text-muted">{{ job.description[:150] }}...</p>

                <div class="d-flex flex-wrap gap-3 mb-3">
                    <span class="badge bg-info">{{ job.category }}</span>
                    <strong class="text-success">Budget: ${{ job.budget }}</strong>
                </div>

                <hr>

                <!-- Proposal Form -->
                <h5 class="fw-bold mb-3">Submit Your Proposal</h5>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Proposal Message</label>
                        <textarea name="proposal" class="form-control" rows="5" placeholder="Describe why you are the best fit for this job..." required></textarea>
                    </div>

                    <button class="btn btn-primary w-100 fw-bold">Submit Application</button>
                </form>

            </div>
        </div>
    </div>

</div>

{% endblock %}
