<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | TalentHub</title>
  <!-- ✅ Favicon -->
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/talenthub_fav_con.jpg') }}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #cfe7ff, #f6faff);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== Navbar ===== */
    .navbar {
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.85) !important;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      z-index: 1000;
      position: sticky;
      top: 0;
    }

    .navbar-brand span {
      font-weight: 700;
      font-size: 1.4rem;
    }

    .nav-link {
      font-weight: 500;
      color: #333 !important;
      transition: color 0.3s ease;
    }

    .nav-link:hover {
      color: #080be2 !important;
    }

    /* ===== Section ===== */
    .register-section {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      min-height: 90vh;
      gap: 3rem;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    /* ===== Left Side Image ===== */
    .illustration {
      width: 480px;
      max-width: 100%;
      border-radius: 18px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      animation: float 4s ease-in-out infinite;
      z-index: 1;
      position: relative;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    /* ===== Form Card ===== */
    .register-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 18px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(8px);
      padding: 40px 35px;
      width: 400px;
      transition: all 0.3s ease;
      position: relative;
      z-index: 2;
      overflow: hidden;
    }

    .register-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(13,110,253,0.08), rgba(13,110,253,0.15));
      border-radius: 18px;
      z-index: 0;
    }

    .register-card h3 {
      font-weight: 700;
      color: #0d6efd;
      margin-bottom: 1rem;
      position: relative;
      z-index: 1;
    }

    label.form-label {
      font-weight: 600;
      color: #333;
      z-index: 1;
      position: relative;
    }

    input, select {
      border-radius: 10px !important;
      border: 1px solid #d8e2f5 !important;
      padding: 10px 14px;
      transition: 0.3s ease;
      position: relative;
      z-index: 1;
    }

    input:focus, select:focus {
      border-color: #0d6efd !important;
      box-shadow: 0 0 8px rgba(13,110,253,0.2);
    }

    .btn-primary {
      background: linear-gradient(90deg, #0d6efd, #4c9fff);
      border: none;
      border-radius: 12px;
      font-weight: 600;
      padding: 12px 0;
      transition: 0.3s ease;
      z-index: 1;
      position: relative;
    }

    .btn-primary:hover {
      background: linear-gradient(90deg, #0056b3, #007bff);
      transform: translateY(-2px);
    }

    p.text-center a {
      text-decoration: none;
      z-index: 10;
      position: relative;
    }

    p.text-center a:hover {
      text-decoration: underline;
    }

    @media (max-width: 992px) {
      .register-card {
        width: 100%;
        max-width: 400px;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="/" style="font-size: 1.25rem;">
        <img src="/static/images/talenthub logo.jpg" alt="TalentHub Logo" 
             style="height: 34px; width: 34px; border-radius: 50%; margin-right: 8px;">
        <span class="fw-bold text-dark">Talent<span style="color: #372175;">Hub</span></span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center" style="gap: 10px;">
          <li class="nav-item"><a class="nav-link fw-medium text-dark" href="/">Home</a></li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle fw-medium text-dark" href="#" id="navbarDropdown"
               role="button" data-bs-toggle="dropdown" aria-expanded="false">More</a>
            <ul class="dropdown-menu shadow-sm border-0 rounded-3">
              <li><a class="dropdown-item" href="/about">About</a></li>
              <li><a class="dropdown-item" href="/contact">Contact</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Register Section -->
  <div class="container register-section">
    <!-- Left Image -->
    <div class="text-center">
      <img src="https://i.pinimg.com/1200x/65/62/a9/6562a9229b380f7881da2ecf441fb33a.jpg"
           alt="Join TalentHub"
           class="illustration">
      <h5 class="mt-3 fw-semibold" style="color: rgb(57, 10, 134);">Find your next opportunity today!</h5>
    </div>

    <!-- Form Card -->
    <div class="register-card">
      <h3 class="text-center">Create Your Account</h3>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required placeholder="Enter username">
        </div>

        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" required placeholder="example@gmail.com">
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required placeholder="Enter password">
        </div>

        <div class="mb-3">
          <label class="form-label">Register as</label>
          <select name="role" class="form-select" required>
            <option value="client">Client (Post Jobs)</option>
            <option value="freelancer">Freelancer (Apply Jobs)</option>
          </select>
        </div>

        <button class="btn btn-primary w-100" type="submit">Register</button>

        <p class="mt-3 text-center">
          Already have an account?
          <a href="/login" class="text-primary fw-semibold">Login</a>
        </p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
