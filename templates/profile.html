{% extends "base.html" %}
{% block title %}My Profile{% endblock %}
{% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-lg border-0 rounded-4 p-4 text-center">
        
        <!-- Profile Picture -->
        <div class="mb-3">
            <i class="bi bi-person-circle text-primary" style="font-size: 5rem;"></i>
        </div>

        <!-- Username + Email -->
        <h4 class="fw-bold text-dark">{{ user.username }}</h4>
        <p class="text-muted mb-3">{{ user.email }}</p>

        <hr class="my-4">

        <!-- Change Password Button -->
        <button id="togglePasswordForm" class="btn btn-outline-primary fw-semibold rounded-pill px-4">
          <i class="bi bi-key me-2"></i> Change Password
        </button>

        <!-- Password Form (Hidden by default) -->
        <form id="passwordForm" method="POST" action="{{ url_for('update_password') }}" class="mt-4 d-none text-start">
          <div class="mb-3">
            <label class="form-label fw-semibold">Old Password</label>
            <input type="password" name="old_password" class="form-control shadow-sm" placeholder="Enter your old password" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">New Password</label>
            <input type="password" name="new_password" class="form-control shadow-sm" placeholder="Enter your new password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold rounded-pill">
            <i class="bi bi-check-circle me-2"></i> Update Password
          </button>
        </form>

      </div>
    </div>
  </div>
</div>

<!-- Script to toggle form visibility -->
<script>
document.getElementById('togglePasswordForm').addEventListener('click', function() {
  const form = document.getElementById('passwordForm');
  form.classList.toggle('d-none');

  if (!form.classList.contains('d-none')) {
    form.style.animation = 'fadeIn 0.4s ease';
  }
});
</script>

<!-- CSS for smooth animation and polish -->
<style>
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.card {
  background: #ffffff;
  transition: all 0.3s ease;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

#passwordForm input {
  border-radius: 10px;
}

#passwordForm input:focus {
  border-color: #0d6efd;
  box-shadow: 0 0 0 0.2rem rgba(13,110,253,0.15);
}
</style>

{% endblock %}
