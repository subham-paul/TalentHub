<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | TalentHub</title>
  <!-- ✅ Favicon -->
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/talenthub_fav_con.jpg') }}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #cfe7ff, #f6faff);
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
    }

    /* Navbar */
    .navbar {
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.9) !important;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      padding: 0.4rem 0;
    }

    .navbar-brand {
      font-weight: 700;
      color: #013286;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .navbar-brand img {
      height: 34px;
      width: 34px;
      border-radius: 50%;
    }

    .nav-link {
      font-weight: 500;
      color: #333 !important;
      transition: 0.3s ease;
    }

    .nav-link:hover {
      color: #0d6efd !important;
    }

    /* Section */
    .login-section {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 3rem;
      min-height: 90vh;
      padding: 2rem;
    }

    /* Left Image */
    .illustration {
      width: 440px;
      max-width: 100%;
      border-radius: 15px;
      animation: float 4s ease-in-out infinite;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    /* Login Card */
    .login-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 18px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(8px);
      padding: 40px 35px;
      width: 400px;
      position: relative;
      overflow: hidden;
      z-index: 2;
    }

    .login-card h3 {
      font-weight: 700;
      color: #0d6efd;
      margin-bottom: 1rem;
      position: relative;
      z-index: 2;
    }

    .form-label {
      font-weight: 600;
      color: #333;
    }

    input.form-control {
      border-radius: 10px;
      border: 1px solid #d8e2f5;
      padding: 10px 12px;
      transition: 0.3s;
      position: relative;
      z-index: 2;
    }

    input:focus {
      border-color: #0d6efd;
      box-shadow: 0 0 8px rgba(13,110,253,0.2);
    }

    .btn-primary {
      background: linear-gradient(90deg, #0d6efd, #4c9fff);
      border: none;
      border-radius: 10px;
      font-weight: 600;
      padding: 12px 0;
      transition: 0.3s;
      z-index: 2;
      position: relative;
    }

    .btn-primary:hover {
      background: linear-gradient(90deg, #0056b3, #007bff);
      transform: translateY(-2px);
    }

    a {
      position: relative;
      z-index: 3;
    }

    @media (max-width: 992px) {
      .login-section {
        flex-direction: column;
        padding: 1.5rem;
      }
      .illustration {
        display: none;
      }
      .login-card {
        width: 100%;
        max-width: 420px;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="/" style="font-size: 1.25rem;">
        <img src="/static/images/talenthub logo.jpg" alt="TalentHub Logo" 
             style="height: 34px; width: 34px; border-radius: 50%; margin-right: 8px;">
        <span class="fw-bold text-dark">Talent<span style="color: #372175;">Hub</span></span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center" style="gap: 10px;">
          <li class="nav-item"><a class="nav-link fw-medium text-dark" href="/">Home</a></li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle fw-medium text-dark" href="#" id="navbarDropdown"
               role="button" data-bs-toggle="dropdown" aria-expanded="false">More</a>
            <ul class="dropdown-menu shadow-sm border-0 rounded-3">
              <li><a class="dropdown-item" href="/about">About</a></li>
              <li><a class="dropdown-item" href="/contact">Contact</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 💼 Login Section -->
  <div class="container login-section">
    <!-- Left Image -->
    <div class="text-center">
      <img src="https://i.pinimg.com/736x/04/73/80/0473804eed4b188846e5379e86c68c58.jpg" alt="Welcome" class="illustration">
      <h5 class="mt-3 fw-semibold" style="color: rgb(57, 10, 134);">Welcome back! Continue your journey with us.</h5>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <h3 class="text-center">Welcome Back</h3>

      <form method="POST" action="">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required placeholder="Enter your email">
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required placeholder="Enter password">
        </div>

        <button class="btn btn-primary w-100 mb-2" type="submit">Login</button>

        <div class="text-center">
          <a href="{{ url_for('forgot_password') }}" class="text-primary fw-semibold text-decoration-none">Forgot Password?</a>
        </div>

        <p class="text-center mt-3">New to TalentHub?
          <a href="{{ url_for('register') }}" class="text-primary fw-semibold text-decoration-none">Create an account</a>
        </p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
